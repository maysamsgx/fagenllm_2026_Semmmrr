
name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  # GROQ_API_KEY_2 and _3 enable round-robin rotation in the evaluator.
  # Add these in GitHub → Settings → Secrets → Actions before running the evaluation job.
  GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
  GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  OPENROUTER_OCR_API_KEY: ${{ secrets.OPENROUTER_OCR_API_KEY }}
  # Primary model is qwen3-32b for all agents — this must stay consistent with production
  QWEN_MODEL: qwen/qwen3-32b
  # Fallback uses same provider (Groq) but smaller model only when primary is unavailable
  GROQ_FALLBACK_MODEL: qwen/qwen3-32b
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 1️⃣ BUILD: Environment Setup & Dependency Validation
  build:
    name: 1️⃣ Build & Setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Environment Secrets
        run: |
          if [ -z "$SUPABASE_URL" ]; then echo "❌ SUPABASE_URL secret is MISSING"; exit 1; fi
          if [ -z "$SUPABASE_SERVICE_KEY" ]; then echo "❌ SUPABASE_SERVICE_KEY secret is MISSING"; exit 1; fi
          if [ -z "$GROQ_API_KEY" ]; then echo "❌ GROQ_API_KEY secret is MISSING"; exit 1; fi
          if [ -z "$GROQ_API_KEY_2" ]; then echo "⚠️ GROQ_API_KEY_2 secret is missing - rotation will be limited"; fi
          if [ -z "$GROQ_API_KEY_3" ]; then echo "⚠️ GROQ_API_KEY_3 secret is missing - rotation will be limited"; fi
          echo "✅ Critical secrets verified."

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8 pytest pylint httpx requests pytest-mock

  # 2️⃣ UNIT TEST: Fast, Isolated Verification (Commit Stage)
  unit-test:
    name: 2️⃣ Unit Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-mock

      - name: Run Unit Tests
        run: python -m pytest tests/test_utils.py tests/test_agents.py tests/test_llm_fallback.py -v

  # 3️⃣ LINT: Code Quality (Commit Stage)
  lint:
    name: 3️⃣ Linting
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8 pylint

      - name: Run Flake8
        run: python -m flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Pylint
        # Enforce fail-under 8.0
        run: python -m pylint . --rcfile=.pylintrc --fail-under=8.0

  # 4️⃣ ACCEPTANCE TEST: End-to-End Causal Reasoning
  acceptance-test:
    name: 4️⃣ Acceptance Tests
    needs: [unit-test, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run System Acceptance Tests
        run: python -m pytest tests/system_acceptance_test.py -s

  # 5️⃣ SCIENTIFIC EVALUATION: Research Validation (90%+ Accuracy)
  scientific-evaluation:
    name: 5️⃣ Scientific Evaluation
    needs: [unit-test, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install thefuzz

      - name: Seed Evaluation Data
        run: python scripts/seed_eval_data.py

      - name: Run Scientific Evaluation Suite
        run: python evaluation/evaluator.py
