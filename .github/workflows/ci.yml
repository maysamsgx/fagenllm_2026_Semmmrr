
name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # 1️⃣ BUILD: Environment Setup & Dependency Validation
  build:
    name: 1️⃣ Build & Setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8 pytest pylint httpx requests pytest-mock

  # 2️⃣ UNIT TEST: Fast, Isolated Verification (Commit Stage)
  unit-test:
    name: 2️⃣ Unit Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-mock

      - name: Run Unit Tests
        run: pytest tests/test_utils.py tests/test_agents.py -v

  # 3️⃣ LINT: Code Quality (Commit Stage)
  lint:
    name: 3️⃣ Linting
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8 pylint

      - name: Run Flake8
        run: flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Pylint
        # Enforce fail-under 8.0
        run: pylint . --rcfile=.pylintrc --fail-under=8.0

  # 4️⃣ ACCEPTANCE TEST: End-to-End Causal Reasoning
  acceptance-test:
    name: 4️⃣ Acceptance Tests
    needs: [unit-test, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run System Acceptance Tests
        run: pytest tests/system_acceptance_test.py -s
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          QWEN_MODEL: qwen/qwen3-32b
          GROQ_FALLBACK_MODEL: llama-3.3-70b-versatile
